<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto bg-white p-4 rounded shadow">
        <h1 class="mb-4 text-center">Login</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input class="form-control mb-3" type="text" name="username" placeholder="Usuário" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Senha" required>
            <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>

        <div class="text-center mt-3">
            <a href="/register">Cadastrar novo usuário</a>
        </div>
    </div>
</div>

</body>
</html>
