<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-6 mx-auto bg-white p-4 rounded shadow">
        <h1 class="mb-4 text-center">Cadastro</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert alert-info">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input class="form-control mb-3" type="text" name="username" placeholder="Usuário" required>
            <input class="form-control mb-3" type="password" name="password" placeholder="Senha" required>

            <label class="form-label">Tipo de usuário</label>
            <select class="form-select mb-3" name="role">
                <option value="user">Usuário</option>
                <option value="admin">Administrador</option>
            </select>

            <button class="btn btn-success w-100" type="submit">Cadastrar</button>
        </form>

        <div class="text-center mt-3">
            <a href="/login">Voltar para login</a>
        </div>
    </div>
</div>

</body>
</html>
